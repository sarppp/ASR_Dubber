# docker-compose.yml — ASR Pipeline production stack
#
# Services:
#   ollama   — LLM inference server (translation model)
#   pipeline — ASR/transcribe/translate/dub pipeline
#
# Quick start:
#   mkdir -p data/input data/output
#   cp your_video.mp4 data/input/
#   TARGET_LANG=fr docker compose up pipeline
#
# Override model at runtime:
#   TRANSLATE_MODEL=gemma3:4b TARGET_LANG=fr docker compose up pipeline

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:

  # ── Ollama (translation LLM) ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: asr_ollama
    restart: unless-stopped
    <<: *gpu
    ports:
      - "11434:11434"           # expose for local testing; remove in prod
    volumes:
      - ollama_models:/root/.ollama    # persist downloaded models
    environment:
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL:-1}"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── Model pull (runs once, then exits) ─────────────────────────────────────
  # Ensures the translation model is available before the pipeline starts.
  ollama-init:
    image: ollama/ollama:latest
    container_name: asr_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      TRANSLATE_MODEL: "${TRANSLATE_MODEL:-translategemma:4b}"
    entrypoint: >
      sh -c "ollama pull $$TRANSLATE_MODEL && echo 'Model ready.'"
    restart: "no"

  # ── ASR Pipeline ────────────────────────────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asr_pipeline
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    <<: *gpu
    volumes:
      - ./data:/data                   # mount local data folder
      - hf_cache:/root/.cache/huggingface   # persist HuggingFace model downloads
    environment:
      # Ollama endpoint — points to the companion service
      OLLAMA_HOST: "http://ollama:11434"

      # ── Target / source language ──────────────────────────────────────────
      TARGET_LANG:    "${TARGET_LANG:-fr}"       # required: fr, en, de, es, …
      LANGUAGE:       "${LANGUAGE:-}"             # source lang (auto-detected if blank)

      # ── Input / output directories ────────────────────────────────────────
      INPUT_DIR:      "${INPUT_DIR:-/data/input}"
      OUTPUT_DIR:     "${OUTPUT_DIR:-/data/output}"

      # ── Run control ───────────────────────────────────────────────────────
      RUN_MODE:       "${RUN_MODE:-full}"          # full | transcribe | translate
      SKIP_NEMO:      "${SKIP_NEMO:-}"             # 1/true = skip NeMo step
      SKIP_TRANSLATE: "${SKIP_TRANSLATE:-}"        # 1/true = skip translation
      SKIP_DUB:       "${SKIP_DUB:-}"              # 1/true = skip dubbing

      # ── NeMo / ASR settings ───────────────────────────────────────────────
      PRECISION:      "${PRECISION:-fp16}"         # fp32 | fp16 | bf16
      NEMO_MODEL:       "${NEMO_MODEL:-}"              # override for ALL languages
      NEMO_MODEL_EN:    "${NEMO_MODEL_EN:-canary-qwen}"   # English  → canary-qwen-2.5b
      NEMO_MODEL_MULTI: "${NEMO_MODEL_MULTI:-qwen3-asr}"  # others   → Qwen3-ASR-1.7B
      CHUNK_OVERRIDE: "${CHUNK_OVERRIDE:-}"        # force chunk size in seconds (e.g. 120)
      RESERVE_GB:     "${RESERVE_GB:-}"            # VRAM reserve GB (default: 1.5)
      SAFETY_FACTOR:  "${SAFETY_FACTOR:-}"         # VRAM safety multiplier (default: 0.85)
      TRIM:           "${TRIM:-0}"                 # process only first N seconds (0 = full)

      # ── Whisper language detection ────────────────────────────────────────
      WHISPER_MODEL:  "${WHISPER_MODEL:-medium}"   # tiny | base | small | medium | large-v3 | turbo

      # ── Translation model (Ollama) ────────────────────────────────────────
      TRANSLATE_MODEL: "${TRANSLATE_MODEL:-translategemma:12b}"   # translategemma:4b or :12b
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL:-1}"
      CHUNK_SIZE: "${CHUNK_SIZE:-40}"                           # subtitle lines per Ollama call (default: 40)

      # ── Dubbing (Qwen TTS) ────────────────────────────────────────────────
      QWEN_MODE:      "${QWEN_MODE:-clone}"        # clone | custom
      NO_DEMUCS:      "${NO_DEMUCS:-}"             # 1/true = skip demucs (faster, no bgm)
    # By default uses entrypoint.sh env-var mode.
    # Pass extra flags: docker compose run pipeline --help
    command: []

volumes:
  ollama_models:
    driver: local
  hf_cache:
    driver: local
